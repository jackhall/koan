[package]
name = "koan"
version = "0.1.0"
edition = "2021"

[lib]
name = "koan"
path = "src/lib.rs"

[[bin]]
name = "koan"
path = "src/main.rs"

[features]
# Under-construction parallel body executor (`core/kfunction/exec`) wired into the
# scheduler in place of `KFunction::invoke`. Off by default; the live path is `invoke.rs`.
exec-v2 = []

[dependencies]
regex = "1.12.3"
typed-arena = "2"
indexmap = "2"
mimalloc = { version = "0.1", default-features = false }
