[package]
name = "koan"
version = "0.1.0"
edition = "2021"

[lib]
name = "koan"
path = "src/lib.rs"

[features]
# The builtin → `Action` harness refactor (src/machine/execute/harness.rs and its lowerings), hidden
# off the default build while it's developed. Off by default; build/test with `--features action-harness`.
action-harness = []

[[bin]]
name = "koan"
path = "src/main.rs"

[dependencies]
regex = "1.12.3"
typed-arena = "2"
indexmap = "2"
mimalloc = { version = "0.1", default-features = false }
