[package]
name = "koan"
version = "0.1.0"
edition = "2021"

[lib]
name = "koan"
path = "src/lib.rs"

[[bin]]
name = "koan"
path = "src/main.rs"

[features]
# Routes the dispatch park-sites (eager-subs, …) through the `DispatchCombine`
# carrier instead of the legacy hand-rolled park/resume path. Off by default;
# the new path is built off to one side and proven green under the feature
# before it replaces the legacy path. See
# roadmap/refactor/dispatch-effect-contract.md.
dispatch-combine = []

[dependencies]
regex = "1.12.3"
typed-arena = "2"
indexmap = "2"
mimalloc = { version = "0.1", default-features = false }
